<!DOCTYPE html>
<html lang='en'>
<head>
<title> CATopalian JavaScript Space Weather Data Center </title>

<meta charset = 'UTF-8'>

<meta name = 'viewport' content = 'width = device-width, initial-scale = 1.0'>

<style>

body
{
    background-color: rgb(30, 30, 30);
    font-family: Arial;
    font-size: 20px;
    font-weight: bold;
    color: rgb(255, 255, 255); 
}

button
{
    background-color: rgb(0, 77, 129);
    margin-left: 2px;
    margin-right: 2px;
    margin-top: 1px;
    margin-bottom: 1px;
    border-style: solid;
    border-width: 1px;
    border-color: rgb(100, 100, 255);
    border-radius: 4px;
    padding-left: 7px;
    padding-right: 7px;
    padding-top: 1px;
    padding-bottom: 1px;
    opacity: 1.0;
    font-size: 12px;
    font-weight: bold;
    color: rgb(255, 255, 255);
    text-align: center;
    cursor: pointer;
}

button:hover
{
    background-color: rgb(6, 31, 47);
    border-color: rgb(0, 255, 255);
    color: rgb(0, 255, 255);
}

button:active
{
    position: relative;
    top: 1px;
    color: rgb(255, 0, 255);
}

#theTextDiv
{
    margin-top: 20px;
    /* white-space pre-wrap keeps the formatting if we use newlines */
    white-space: pre-wrap;
    border: 2px solid rgb(100, 100, 100);
    padding: 10px;
    /* smooth transition for the color changes */
    transition: border-color 0.3s, color 0.3s; 
    font-family: monospace;
}

</style>

<script src = 'fetchXrayData.js'></script>

<script>

// shortcuts.js

function ge(whichId)
{
    let result = document.getElementById(whichId);
    return result;
}

function ce(whichType)
{
    let result = document.createElement(whichType);
    return result;
}

function ba(whichElement)
{
    let result = document.body.append(whichElement);
}

function cl(whichMessage)
{
    console.log(whichMessage);
}

//----//

function makeInterface()
{
    let xrayFlux = ce('div');
    xrayFlux.textContent = 'X-RAY FLUX';
    xrayFlux.style.fontSize = "20px";
    ba(xrayFlux);

    //-//

    let fetchDataBtn = ce('button');
    fetchDataBtn.textContent = 'Get X-Ray Data';
    
    // the click function must be ASYNC because fetchXrayData is async
    fetchDataBtn.onclick = async function() 
    {
        // call the Worker to get the data
        let xrayData = await fetchXrayData(); 
        
        // safety check: Did we get data?
        if (xrayData)
        {
            // let's grab the LATEST reading
            let latestReading = xrayData[xrayData.length - 1];
            
            // extract the flux number
            let currentFlux = latestReading.flux;
            
            // run it through the Calculator
            let ratingString = formatFlareRating(currentFlux);
            
            // run it through the Artist
            let colorCode = getFlareColor(currentFlux);
            
            // format the string for the display
            let report = 
            '-----------------------------\n' +
            'SYSTEM STATUS: ONLINE\n' +
            'Time: ' + latestReading.time_tag + '\n' +
            'Raw Flux: ' + currentFlux + '\n' +
            'Threat Level: ' + ratingString + '\n' +
            '-----------------------------';
            
            let displayDiv = ge('theTextDiv');
            displayDiv.textContent = report;
            
            // apply the Artist's color to the interface!
            displayDiv.style.color = colorCode;
            displayDiv.style.borderColor = colorCode;
        }
        else
        {
            let displayDiv = ge('theTextDiv');
            displayDiv.textContent = "System Offline: No data received.";
            displayDiv.style.color = "red";
            displayDiv.style.borderColor = "red";
        }
    };
    ba(fetchDataBtn);

    //-//
    
    let theTextDiv = ce('div');
    theTextDiv.id = 'theTextDiv';
    theTextDiv.textContent = "Awaiting scan...";
    ba(theTextDiv);
}

</script>

</head>

<body onload = 'makeInterface();'>

</body>

</html>
